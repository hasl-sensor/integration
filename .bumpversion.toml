[tool.bumpversion]
current_version = "4.0.0"
commit = true
tag = false

[[tool.bumpversion.files]]
filename = "README.md"
search = 'badge/version-{current_version}-green.svg'
replace = 'badge/version-{new_version}-green.svg'

[[tool.bumpversion.files]]
filename = "./custom_components/hasl3/const.py"
search = 'HASL_VERSION = "{current_version}"'
replace = 'HASL_VERSION = "{new_version}"'

[[tool.bumpversion.files]]
filename = "./custom_components/hasl3/manifest.json"
search = '"version": "{current_version}"'
replace = '"version": "{new_version}"'
